<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mis XV - Juliana Sofia</title>
    <style>
        /* Eliminamos cualquier margen y forzamos el fondo rosa para que no haya negro */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; /* Evita que la página baile */
            background-color: #fce4ec; /* Un tono rosado acorde a tu diseño */
        }

        .canva-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        /* El truco: hacemos que el iframe sea un poco más grande y se centre */
        iframe {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100vw;
            height: 100vh;
            transform: translate(-50%, -50%) scale(1.02); /* El scale 1.02 elimina bordes finos */
            border: none;
        }

        /* Ajuste específico para que el contenido de Canva se estire a llenar */
        @media (max-aspect-ratio: 9/16) {
            iframe {
                height: 100%;
                width: auto;
                min-width: 100vw;
            }
        }
    </style>
</head>
<body>

    <div class="canva-wrapper">
        <iframe src="https://www.canva.com/design/DAHC21F5AII/84c7oibemtWI9lhc4cOneA/view?embed" 
                allowfullscreen="allowfullscreen" allow="fullscreen">
        </iframe>
    </div>

</body>
</html>
